[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sentiment-ai"
version = "0.0.0"  # scaffold only; first real release tracks R-package v2 parity
description = "Simple, tunable sentiment analysis from sentence embeddings — TensorFlow-free. Python sibling of the R package sentiment.ai."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "Ben Wiseman", email = "benjamin.h.wiseman@gmail.com" }]
keywords = ["sentiment", "nlp", "embeddings", "sentence-transformers", "xgboost"]
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: MIT License",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

# Planned runtime deps (the engine is already Python — no reticulate bridge, unlike R).
dependencies = [
  "numpy>=1.21",
  "sentence-transformers>=2.2",   # on-device embedders (bge-small/base, multilingual)
  "xgboost>=1.7",                 # scoring models (.xgb) — multithreaded here (OpenMP), unlike the R build
  "huggingface-hub>=0.16",        # model-artifact download on first use
  "requests>=2.28",               # optional OpenAI embedding backend
]

[project.optional-dependencies]
dev = ["pytest>=7", "ruff"]

[project.urls]
Homepage = "https://benwiseman.github.io/sentiment.ai/"
Source = "https://github.com/BenWiseman/sentiment.ai"

[tool.setuptools.packages.find]
include = ["sentimentai*"]
